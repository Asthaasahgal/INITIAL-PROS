<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="color.css" />
    <title>JavaScript Background Color Switcher</title>
  </head>
  <body>
  
    <div class="canvas">
    
      <h1>Color Switcher </h1>
      <span class="button" id="lightpink"></span>
      <span class="button" id="lightblue"></span>
      <span class="button" id="mediumaquamarine"></span>
      <span class="button" id="lavender"></span>
      <span class="button" id="plum"></span>
      <h2>
        Tap any color
        <span>& change the background !</span>
      </h2>
    </div>
    <script src="color.js"></script>
  </body>
</html>
