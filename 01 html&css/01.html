<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>
     <link rel="stylesheet" href="css1.css">

     <!-- Basic Icons -->
<link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
<!-- Filled Icons -->
<link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
<!-- Brand Icons -->
<link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">

</head>
<body>
    <div class="profile-card">
        <div class="image">
            <img src="profile.jpg" alt="" class="profile-image">
        </div>
        <div class="text-data">
        <span class="name"> Asthaa Sahgal</span>
    </div>
     <div class="text-data">
        <span class="job"> Graphic Designer</span>
    </div>
    <div class="media-button">
        <a href="#" class="link">
            <i class="bx bx-thumb-up" > </i>
        </a>
         <a href="#" class="link">
            <i class="bx bx-cool" ></i>
        </a>
         <a href="#" class="link">
            <i class="bx bx-heart" ></i>
        </a>
         <a href="#" class="link">
            <i class="bx bx-message-heart" ></i>
        </a>
    </div>
     <div class="buttons">
            <button class="button"> Hello </button>
            <button class="button"> Talk </button>
        </div>

    </div>

</body>
</html>
